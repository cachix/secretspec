name: changeset-policy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read

concurrency:
  group: changeset-policy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: collect changed files
        id: changed
        uses: tj-actions/changed-files@v46
      - name: run changeset policy
        uses: monochange/actions/changeset-policy@53bd37cbecff25eeefa689bd7ac5fc807dbabac7
        with:
          setup-monochange: devenv shell monochange
          changed-paths: ${{ steps.changed.outputs.all_changed_files }}
          labels: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
