name: "Python wheels"

# Builds platform wheels for the Python SDK that bundle the secretspec-ffi
# cdylib (into secretspec/_lib/), so `pip install secretspec` works without a
# separate native build.
#
# NOTE: the Linux wheels produced here are tagged `linux_*`, not `manylinux_*`.
# Publishing to PyPI requires repairing them against a manylinux toolchain
# (`auditwheel repair`) so the bundled cdylib's system dependencies (notably
# libdbus, pulled in by the keyring provider) are vendored and the glibc
# requirement is portable. That repair step is the remaining follow-up before a
# PyPI release; the build + bundling mechanism below is what is validated.

on:
  workflow_dispatch:
  push:
    tags:
      - v**
  pull_request:
    paths:
      - "secretspec-py/**"
      - "secretspec-ffi/**"
      - "secretspec/**"
      - ".github/workflows/python-wheels.yml"

jobs:
  wheels:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: linux-x86_64, runner: ubuntu-latest }
          - { target: linux-aarch64, runner: ubuntu-24.04-arm }
          - { target: macos-x86_64, runner: macos-13 }
          - { target: macos-aarch64, runner: macos-14 }
          - { target: windows-x86_64, runner: windows-latest }

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux system dependencies (dbus for keyring)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Stage the cdylib and build the wheel
        shell: bash
        run: |
          python -m pip install --upgrade build
          bash secretspec-py/scripts/stage-cdylib.sh
          ( cd secretspec-py && python -m build --wheel --outdir "$GITHUB_WORKSPACE/wheelhouse" )

      - name: Smoke test the wheel
        shell: bash
        run: |
          python -m pip install --find-links wheelhouse secretspec
          # Run outside the repo with no SECRETSPEC_FFI_LIB so only the bundled
          # library can satisfy the import.
          cd "$RUNNER_TEMP"
          python -c "import secretspec; print('abi', secretspec.abi_version())"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: wheelhouse/*.whl
