name: "Test"

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v5
    - uses: cachix/install-nix-action@v31
    - uses: cachix/cachix-action@v16
      with:
        name: devenv
    - name: Install devenv.sh
      run: nix profile install github:cachix/devenv/994990b08e9afcf31356a860cc7af241ba8c2808

    - name: Build the devenv shell and run any pre-commit hooks
      run: devenv test
