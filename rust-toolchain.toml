# Single source of truth for the Rust version. Consumed by:
#   - devenv (languages.rust.toolchainFile in devenv.nix), covering local
#     shells and the devenv-based workflows
#   - rustup on the native CI runners (artifact workflows that cannot use
#     devenv because their outputs must not link the Nix store)
