name: "npm bootstrap publish (one-time)"

# ONE-TIME workflow to create the 5 npm packages (main `secretspec` + 4
# platform packages) before npm Trusted Publishing can be attached to them.
# Unlike PyPI/RubyGems, npm has no "pending publisher" mechanism -- a package
# must already exist before a Trusted Publisher can be configured for it (see
# RELEASE.md's "Before your first release" section).
#
# Requires a repo secret NPM_BOOTSTRAP_TOKEN: a temporary npm granular access
# token ("All Packages", "Read and write", short expiry). Add it via
# Settings -> Secrets and variables -> Actions before running this via
# workflow_dispatch, then:
#   1. Configure a Trusted Publisher for each of the 5 published packages
#      (repo cachix/secretspec, workflow node-addon.yml).
#   2. Delete the NPM_BOOTSTRAP_TOKEN secret and revoke the token on npm.
#   3. Delete this workflow file -- it has no further purpose once the 5
#      packages exist, and every release after this uses OIDC via
#      node-addon.yml's publish job.

on:
  workflow_dispatch:

jobs:
  addon:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: linux-x64, platform: linux-x64-gnu, runner: ubuntu-latest }
          - { target: linux-arm64, platform: linux-arm64-gnu, runner: ubuntu-24.04-arm }
          - { target: darwin-arm64, platform: darwin-arm64, runner: macos-latest }
          - { target: win32-x64, platform: win32-x64-msvc, runner: windows-latest }
    steps:
      - uses: actions/checkout@v5
      - name: Sync SDK package versions
        run: bash scripts/sync-sdk-versions.sh

      - name: Install Linux system dependencies (dbus for keyring)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust (pinned by rust-toolchain.toml)
        run: rustup toolchain install
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install napi CLI
        run: npm ci
        working-directory: secretspec-node

      - name: Build the addon
        shell: bash
        run: bash secretspec-node/scripts/build-addon.sh

      - name: Copy the addon to its platform-specific filename
        shell: bash
        run: cp secretspec-node/secretspec.node "secretspec-node/secretspec.${{ matrix.platform }}.node"

      - uses: actions/upload-artifact@v4
        with:
          name: node-addon-${{ matrix.target }}
          path: secretspec-node/secretspec.${{ matrix.platform }}.node

  bootstrap-publish:
    name: bootstrap publish to npm
    needs: [addon]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Sync SDK package versions
        run: bash scripts/sync-sdk-versions.sh
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install napi CLI
        run: npm ci
        working-directory: secretspec-node
      - name: Scaffold per-platform npm package dirs
        run: node_modules/.bin/napi create-npm-dirs
        working-directory: secretspec-node
      - name: Download platform addons
        uses: actions/download-artifact@v4
        with:
          pattern: node-addon-*
          path: artifacts
          merge-multiple: true
      - name: Place each addon into its npm package dir
        shell: bash
        run: |
          for f in artifacts/secretspec.*.node; do
            platform="$(basename "$f" .node | sed 's/^secretspec\.//')"
            cp "$f" "secretspec-node/npm/$platform/$(basename "$f")"
          done
      - name: Publish platform packages
        working-directory: secretspec-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: node_modules/.bin/napi pre-publish --tag-style npm --no-gh-release
      - name: Publish main package
        working-directory: secretspec-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: npm publish
