name: secretspec
description: >-
  Resolve secrets declared in secretspec.toml and expose them to the rest of
  the job. Values are masked in the runner log and appended to $GITHUB_ENV, so
  later steps see them as environment variables.

inputs:
  profile:
    description: secretspec profile to resolve
    required: false
    default: ""
  provider:
    description: provider name, alias, or URI to resolve from
    required: false
    default: ""
  version:
    description: secretspec release tag to install, or "latest"
    required: false
    default: latest
  working-directory:
    description: directory containing secretspec.toml
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Install secretspec
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        if [ "$VERSION" = latest ]; then
          curl --proto '=https' --tlsv1.2 -sSfL https://install.secretspec.dev | sh
        else
          # cargo-dist publishes a pinned installer per release tag
          curl --proto '=https' --tlsv1.2 -sSfL \
            "https://github.com/cachix/secretspec/releases/download/v${VERSION#v}/secretspec-installer.sh" | sh
        fi
        echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> "$GITHUB_PATH"

    - name: Export secrets to the job environment
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SECRETSPEC_PROFILE: ${{ inputs.profile }}
        SECRETSPEC_PROVIDER: ${{ inputs.provider }}
      run: secretspec export --format gha
