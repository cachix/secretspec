name: Publish Crates

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g., 0.1.2 or v0.1.2)"
        required: true
        type: string
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # The full devenv shell includes every SDK toolchain plus the musl static
      # dependencies. It no longer fits alongside the preinstalled software on
      # GitHub's Ubuntu image, so reclaim that space before populating /nix.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /opt/ghc \
            /usr/local/share/boost /usr/local/share/powershell
          sudo docker image prune --all --force
          df -h /

      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: devenv
      - name: Install devenv.sh
        run: nix profile install nixpkgs#devenv

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish Rust crates
        # The derive crate has a registry dependency on the main crate, so the
        # main crate must be published first. Registry checks make retries
        # idempotent when a previous run published successfully but failed
        # during cleanup.
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n '/^\[workspace.package\]/,/^\[/s/^version = "\(.*\)"/\1/p' Cargo.toml)"
          user_agent="secretspec-release/${version} (https://github.com/cachix/secretspec)"

          for crate in secretspec secretspec-derive; do
            if curl -fsS -A "$user_agent" \
              "https://crates.io/api/v1/crates/${crate}/${version}" >/dev/null; then
              echo "${crate} ${version} is already published"
              continue
            fi

            devenv shell cargo publish -p "$crate"

            published=false
            for _ in $(seq 1 30); do
              if curl -fsS -A "$user_agent" \
                "https://crates.io/api/v1/crates/${crate}/${version}" >/dev/null; then
                published=true
                break
              fi
              sleep 10
            done
            if [[ "$published" != true ]]; then
              echo "${crate} ${version} was not visible on crates.io after five minutes" >&2
              exit 1
            fi
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
